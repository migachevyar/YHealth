<script>
// Находишь функцию saveProfile и заменяешь её на эту:
async function saveProfile() {
    const btn = document.querySelector('.setup-btn');
    if(btn) btn.classList.add('loading');
    
    try {
        // Сохраняем в облако ТГ (как и было)
        await tg.CloudStorage.setItem('profile', JSON.stringify(profile));
        
        // НОВОЕ: Отправляем данные на твой сервер Railway, чтобы бот их увидел
        const initData = tg.initData;
        const response = await fetch('/api/profile', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                _auth: initData,
                profile: profile
            })
        });

        if (response.ok) {
            tg.showAlert('Настройки сохранены! Бот обновит уведомления.');
            // Сразу просим бота обновить расписание
            tg.sendData(JSON.stringify({action: 'reload_reminders'}));
        }
    } catch (e) {
        console.error(e);
        tg.showAlert('Ошибка сохранения');
    } finally {
        if(btn) btn.classList.remove('loading');
    }
}
</script>
